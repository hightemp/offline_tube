name: Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Rename APKs
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk artifacts/offline-tube-${{ steps.version.outputs.VERSION }}-debug.apk
          cp app/build/outputs/apk/release/app-release-unsigned.apk artifacts/offline-tube-${{ steps.version.outputs.VERSION }}-release.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Offline Tube v${{ steps.version.outputs.VERSION }}
          body: |
            ## Offline Tube v${{ steps.version.outputs.VERSION }}

            ### Установка
            1. Скачайте APK файл ниже
            2. Разрешите установку из неизвестных источников
            3. Установите APK

            ### Файлы
            - `offline-tube-*-debug.apk` — отладочная сборка
            - `offline-tube-*-release.apk` — релизная сборка (без подписи)
          draft: false
          prerelease: false
          files: artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
